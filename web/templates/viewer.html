<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .RepoName }} - gitweb</title>
    <link rel="stylesheet" href="/static/css/viewer.css">
    <link rel="stylesheet" href="/static/css/toast.css">
</head>
<body>
    <!-- 浮动文件树窗口：可拖动 / 可缩放 / 可缩为迷你浮岛（贴边吸附） -->
    <div class="floating-tree-window" id="floating-tree-window">
        <div class="floating-tree-titlebar" id="floating-tree-titlebar">
            <h3>
                <svg class="ft-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                </svg>
                <span class="ft-title" data-en="Files" data-zh="文件目录">文件目录</span>
            </h3>
            <div class="floating-tree-controls">
                <!-- 停靠方向切换按钮：仅 docked 态显示，点击弹菜单切左/底/右 -->
                <button class="dock-switch-btn floating-tree-btn" id="dock-switch-btn" type="button" title="切换停靠位置" data-en-title="Switch dock side" data-zh-title="切换停靠位置" aria-label="切换停靠位置" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
                </button>
                <button class="floating-tree-btn refresh" id="refresh-tree-btn" title="刷新文件树" data-en-title="Refresh tree" data-zh-title="刷新文件树" aria-label="刷新文件树">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
                </button>
                <button class="floating-tree-btn minimize" id="minimize-btn" title="单击缩小" data-en-title="Minimize" data-zh-title="单击缩小" aria-label="缩小">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M5 12h14"/></svg>
                </button>
            </div>
        </div>
        <!-- 迷你浮岛态：居中显示的图标（可拖动、贴边吸附） -->
        <div class="min-dock" id="min-dock" title="点击展开 · 拖到边缘吸附">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            </svg>
        </div>
        <div class="floating-tree-content" id="floating-tree-content">
            <div class="tree-loading" data-en="Loading..." data-zh="加载中...">加载中...</div>
        </div>
    </div>

    <!-- 气泡提示：首次打开时引导点击浮岛展开文件目录。
         放在 .floating-tree-window 外层（该窗口 overflow:hidden + transform 会裁剪 fixed 子元素） -->
    <div class="dock-bubble" id="dock-bubble" style="display:none;">
        <span data-en="Click to browse files" data-zh="点击查看文件目录">点击查看文件目录</span>
        <button class="dock-bubble-close" id="dock-bubble-close" title="知道了" data-en-title="Got it" data-zh-title="知道了" aria-label="知道了">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
    </div>

    <!-- 停靠方向菜单：长按"-"按钮触发。放外层避免被浮窗 overflow:hidden 裁剪。
         三选一：左 / 底 / 右（DevTools 风格；"中"理解为底部）。 -->
    <div class="dock-side-menu" id="dock-side-menu" role="menu" aria-label="停靠文件目录" style="display:none;">
        <button class="dock-side-btn" type="button" data-side="left" title="停靠到左侧">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="3" y="4" width="7" height="16" rx="1.5"/><rect x="12" y="4" width="9" height="16" rx="1.5" fill="currentColor" opacity="0.18"/></svg>
        </button>
        <button class="dock-side-btn" type="button" data-side="bottom" title="停靠到底部">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="3" y="4" width="18" height="9" rx="1.5" fill="currentColor" opacity="0.18"/><rect x="3" y="15" width="18" height="5" rx="1.5"/></svg>
        </button>
        <button class="dock-side-btn" type="button" data-side="right" title="停靠到右侧">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="14" y="4" width="7" height="16" rx="1.5"/><rect x="3" y="4" width="9" height="16" rx="1.5" fill="currentColor" opacity="0.18"/></svg>
        </button>
    </div>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="viewer-header">
            <div class="repo-info">
                <h1 id="repo-title">{{ .RepoName }}</h1>
                <div class="branch-switcher" id="branch-switcher">
                    <button class="repo-ref branch-trigger" id="branch-trigger" type="button"
                            title="切换分支" aria-haspopup="listbox" aria-expanded="false">
                        <svg class="branch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="6" r="2.5"/><path d="M6 8.5v7"/><path d="M6 12h6a3 3 0 0 0 3-3V8.5"/></svg>
                        <span class="branch-name" id="branch-name">{{ .Ref }}</span>
                        <svg class="branch-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
                    </button>
                    <div class="branch-menu" id="branch-menu" role="listbox" aria-label="分支">
                        <div class="branch-menu-loading" data-en="Loading..." data-zh="加载中...">加载中...</div>
                    </div>
                </div>
            </div>
            <div class="content-header-actions">
                <a href="/" class="home-link"><span data-en="← Home" data-zh="← 首页">← 首页</span></a>
                <div class="settings-menu" id="settings-menu">
                    <button class="settings-trigger" id="settings-trigger" title="设置" aria-haspopup="menu" aria-expanded="false" aria-label="设置">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </button>
                    <div class="settings-dropdown" id="settings-dropdown" role="menu">
                        <button class="settings-item" id="theme-toggle-viewer" role="menuitem" type="button">
                            <!-- 双图标：亮色=太阳(si-icon-on)，暗色=月亮(si-icon-off)。.checked=暗色 -->
                            <svg class="si-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                            <svg class="si-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                            <span class="si-label" data-en="Light" data-zh="亮色">亮色</span>
                        </button>
                        <button class="settings-item" id="lang-toggle-viewer" role="menuitem" type="button" aria-pressed="false">
                            <!-- 地球图标 -->
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                            <!-- 文案=将要切换到的目标语言：当前 zh → 「English」，当前 en → 「中文」 -->
                            <span class="si-label">English</span>
                        </button>
                        <div class="settings-divider"></div>
                        <button class="settings-item" id="hidden-files-btn" role="menuitem" type="button" aria-pressed="false">
                            <!-- 图标=当前状态：隐藏中显示划眼（si-icon-on，未 .checked 时显示），
                                 显示中显示睁眼（si-icon-off，.checked 时显示）。与 VS Code 资源管理器一致。 -->
                            <svg class="si-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.88 9.88a3 3 0 0 0 4.24 4.24"/><path d="M6.06 6.06a10.94 10.94 0 0 0-4.06 5.94 10.94 10.94 0 0 0 11.94 6.94"/><path d="M3 3l18 18"/></svg>
                            <svg class="si-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
                            <!-- 文案=点击目标（与主题切换同款）：默认隐藏中 → 「显示隐藏文件」 -->
                            <span class="si-label" data-en="Show hidden files" data-zh="显示隐藏文件">显示隐藏文件</span>
                        </button>
                        <button class="settings-item" id="line-numbers-btn" role="menuitem" type="button" aria-pressed="false">
                            <!-- 图标=当前状态：不显示行号时为「无序列表」（si-icon-on，未 .checked 时显示），
                                 显示行号时为「有序列表」（si-icon-off，.checked 时显示）。 -->
                            <svg class="si-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4.5" cy="6" r="1"/><circle cx="4.5" cy="12" r="1"/><circle cx="4.5" cy="18" r="1"/></svg>
                            <svg class="si-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><text x="3" y="8" font-size="7" stroke="none" fill="currentColor">1</text><text x="3" y="14" font-size="7" stroke="none" fill="currentColor">2</text><text x="3" y="20" font-size="7" stroke="none" fill="currentColor">3</text></svg>
                            <!-- 文案=点击目标：默认不显示行号 → 「显示行号」 -->
                            <span class="si-label" data-en="Show line numbers" data-zh="显示行号">显示行号</span>
                        </button>
                        <button class="settings-item" id="view-source-btn" role="menuitem" type="button" aria-pressed="false">
                            <svg class="si-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/></svg>
                            <svg class="si-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12l5-5"/><path d="M3 12l5 5"/><path d="M21 12l-5-5"/><path d="M21 12l-5 5"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
                            <span class="si-label" data-en="View source" data-zh="显示源代码">显示源代码</span>
                        </button>
                        <div class="settings-divider"></div>
                        <button class="settings-item" id="download-file-btn" role="menuitem" type="button">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
                            <span class="si-label" data-en="Download file" data-zh="下载文件">下载文件</span>
                        </button>
                        <button class="settings-item" id="share-page-btn" role="menuitem" type="button">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                            <span class="si-label" data-en="Share page" data-zh="分享当前页面">分享当前页面</span>
                        </button>
                        <div class="settings-divider"></div>
                        <button class="settings-item" id="site-info-btn" role="menuitem" type="button">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                            <span class="si-label" data-en="Site info" data-zh="站点信息">站点信息</span>
                        </button>
                        <button class="settings-item" id="ref-switch-btn" role="menuitem" type="button">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="6" r="2.5"/><path d="M6 8.5v7"/><path d="M6 12h6a3 3 0 0 0 3-3V8.5"/></svg>
                            <span class="si-label" data-en="Switch ref" data-zh="切换 ref">切换 ref</span>
                        </button>
                        <button class="settings-item" id="auth-site-btn" role="menuitem" type="button">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="7.5" cy="15.5" r="3.5"/><path d="M10.5 15V7.5a2 2 0 0 1 2-2H18"/><path d="M15 3.5l3 2-3 2"/></svg>
                            <span class="si-label" data-en="Credentials" data-zh="凭据">凭据</span>
                        </button>
                        <button class="settings-item danger" id="delete-site-btn" role="menuitem" type="button">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                            <span class="si-label" data-en="Delete site" data-zh="删除站点">删除站点</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="content-area" id="content-area">
            <div class="welcome" data-en="Click the folder icon at the bottom-right to browse files" data-zh="点右下角文件夹图标浏览文件">点右下角文件夹图标浏览文件</div>
        </div>
    </main>

    <!-- 凭据输入弹窗（私有仓库运行时鉴权） -->
    <div class="auth-modal" id="auth-modal" style="display:none;">
        <div class="auth-modal-card">
            <h2 data-en="Authentication required" data-zh="该仓库需要鉴权">该仓库需要鉴权</h2>
            <p data-en="Credentials stay in your browser only, never uploaded to the server. Default: current tab only. Check 'Save to browser' to keep on this device for 7 days." data-zh="凭据仅保存在浏览器，不会上传服务器。默认仅当前标签页有效；勾选「保存到浏览器」可在此设备保留 7 天。">凭据仅保存在浏览器，不会上传服务器。默认仅当前标签页有效；勾选「保存到浏览器」可在此设备保留 7 天。</p>
            <div id="auth-error" class="auth-error" style="display:none;"></div>
            <div class="auth-form">
                <select id="auth-type">
                    <option value="token" data-en="Token" data-zh="Token">Token</option>
                    <option value="basic" data-en="Username & Password" data-zh="账号密码">账号密码</option>
                </select>
                <input type="password" id="auth-token" placeholder="Token" data-en-placeholder="Token" data-zh-placeholder="Token" autocomplete="off">
                <input type="text" id="auth-username" placeholder="用户名" data-en-placeholder="Username" data-zh-placeholder="用户名" autocomplete="off" style="display:none;">
                <input type="password" id="auth-password" placeholder="密码" data-en-placeholder="Password" data-zh-placeholder="密码" autocomplete="off" style="display:none;">
                <label class="auth-save-row">
                    <input type="checkbox" id="auth-save-local">
                    <span data-en="Save to this browser (7 days)" data-zh="保存到浏览器（7 天）">保存到浏览器（7 天）</span>
                </label>
                <div class="auth-actions">
                    <button id="auth-cancel" data-en="Cancel" data-zh="取消">取消</button>
                    <button id="auth-submit" class="primary" data-en="Confirm" data-zh="确认">确认</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="auth-modal" id="delete-modal" style="display:none;">
        <div class="auth-modal-card">
            <h2 data-en="Confirm delete?" data-zh="确认删除？">确认删除？</h2>
            <!-- 文案含动态 pathid/repo，由 JS 在打开时按 currentLang 拼接 -->
            <p id="delete-message"></p>
            <div class="auth-actions">
                <button id="delete-cancel" data-en="Cancel" data-zh="取消">取消</button>
                <button id="delete-confirm" class="primary" data-en="Delete" data-zh="删除">删除</button>
            </div>
        </div>
    </div>

    <!-- 切换 ref 弹窗：输入任意分支 / tag / commit SHA -->
    <div class="auth-modal" id="ref-modal" style="display:none;">
        <div class="auth-modal-card">
            <h2 data-en="Switch ref" data-zh="切换 ref">切换 ref</h2>
            <p data-en="Enter a branch, tag, or commit SHA to view. The change is temporary and not saved to the site." data-zh="输入分支、tag 或 commit SHA 来切换查看。临时切换，不会写入站点配置。">输入分支、tag 或 commit SHA 来切换查看。临时切换，不会写入站点配置。</p>
            <div class="auth-form">
                <input type="text" id="ref-input" placeholder="branch / tag / commit" autocomplete="off">
                <div class="auth-actions">
                    <button id="ref-cancel" data-en="Cancel" data-zh="取消">取消</button>
                    <button id="ref-submit" class="primary" data-en="Switch" data-zh="切换">切换</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 站点信息弹窗：展示该站点的配置/记录 -->
    <div class="auth-modal" id="info-modal" style="display:none;">
        <div class="auth-modal-card">
            <h2 data-en="Site info" data-zh="站点信息">站点信息</h2>
            <dl class="info-list">
                <div class="info-row"><dt data-en="Repo URL" data-zh="原始地址">原始地址</dt><dd id="info-giturl"></dd></div>
                <div class="info-row"><dt>Provider</dt><dd id="info-provider"></dd></div>
                <div class="info-row"><dt>Ref</dt><dd id="info-ref"></dd></div>
                <div class="info-row"><dt data-en="Auth" data-zh="凭据">凭据</dt><dd id="info-auth"></dd></div>
                <div class="info-row"><dt data-en="Created" data-zh="创建时间">创建时间</dd><dd id="info-created"></dd></div>
                <div class="info-row"><dt data-en="Views" data-zh="浏览次数">浏览次数</dt><dd id="info-views"></dd></div>
                <div class="info-row info-row-toggle">
                    <dt data-en="Visibility" data-zh="可见性">可见性</dt>
                    <dd>
                        <label class="visibility-toggle-inline">
                            <input type="checkbox" id="info-hidden-toggle">
                            <span class="vt-switch"><span class="vt-thumb"></span></span>
                            <span class="vt-label" id="info-hidden-label"></span>
                        </label>
                    </dd>
                </div>
            </dl>
            <div class="auth-actions">
                <button id="info-close" class="primary" data-en="Close" data-zh="关闭">关闭</button>
            </div>
        </div>
    </div>

<script src="/static/js/toast.js"></script>
<script nonce="{{ .Nonce }}">
(function () {
    const pathID = '{{ .PathID }}';
    const repoName = '{{ .RepoName }}';
    const gitURL = '{{ .GitURL }}';
    const STORAGE_KEY = 'gitweb_auth_' + pathID;
    const STORAGE_KEY_LOCAL = 'gitweb_auth_saved_' + pathID;
    const SAVE_DAYS = 7;
    let allFiles = [];
    let currentPath = '';
    let viewSourceMode = false; // 源码模式：true=当前 content-area 显示原始源码
    let currentRef = '{{ .Ref }}'; // 临时分支：切换分支时改写，不持久化
    let authResolve = null; // 凭据弹窗的 resolve
    let authFromButton = false; // 凭据弹窗由「凭据」按钮触发（提交后需手动重载文件树）
    let authFailed = false; // 上次凭据是否无效（用于弹窗显示错误提示）
    let lastFailedType = null; // 上次失败的凭据类型（basic/token），用于给出针对性提示

    // ---------- 主题：读 localStorage + 系统偏好，与首页共用 key ----------
    let currentLang = localStorage.getItem('lang') ||
                      (navigator.language.startsWith('zh') ? 'zh' : 'en');

    // 根据 HTTP 状态码返回本地化的错误提示，统一处理 429 限流等常见错误。
    function httpErrorMsg(resp, fallbackZh, fallbackEn) {
        if (resp.status === 429) {
            return currentLang === 'zh' ? '请求过于频繁，请稍后再试' : 'Too many requests, please try again later';
        }
        return currentLang === 'zh' ? fallbackZh : fallbackEn;
    }

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        const btn = document.getElementById('theme-toggle-viewer');
        if (!btn) return;
        // 图标 + 文案 = 当前状态：dark → 月亮 + "暗色主题"；light → 太阳 + "亮色主题"
        btn.classList.toggle('checked', theme === 'dark');
        const label = btn.querySelector('.si-label');
        if (label) {
            const en = theme === 'dark' ? 'Dark theme' : 'Light theme';
            const zh = theme === 'dark' ? '暗色主题' : '亮色主题';
            label.textContent = currentLang === 'zh' ? zh : en;
            label.setAttribute('data-en', en);
            label.setAttribute('data-zh', zh);
        }
    }

    function initTheme() {
        const saved = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(saved || (systemDark ? 'dark' : 'light'));

        const toggle = document.getElementById('theme-toggle-viewer');
        if (toggle) {
            toggle.addEventListener('click', () => {
                const cur = document.documentElement.getAttribute('data-theme');
                const next = cur === 'dark' ? 'light' : 'dark';
                applyTheme(next);
                localStorage.setItem('theme', next);
                closeSettings();
            });
        }

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
        });
    }

    function applyLang(lang) {
        document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en');
        document.querySelectorAll('[data-en][data-zh]').forEach(el => {
            const text = lang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = text;
            else el.textContent = text;
        });
        // 带 data-en-placeholder/data-zh-placeholder 的 input（凭据弹窗的用户名/密码）
        document.querySelectorAll('[data-en-placeholder][data-zh-placeholder]').forEach(el => {
            el.placeholder = lang === 'zh' ? el.getAttribute('data-zh-placeholder') : el.getAttribute('data-en-placeholder');
        });
        // 带 data-en-title/data-zh-title 的元素（刷新/最小化按钮 title 等）
        document.querySelectorAll('[data-en-title][data-zh-title]').forEach(el => {
            el.title = lang === 'zh' ? el.getAttribute('data-zh-title') : el.getAttribute('data-en-title');
        });
        const cur = document.documentElement.getAttribute('data-theme') || 'light';
        applyTheme(cur);
        // 三个「动态文案」按钮：label 由各自 update 函数按 currentLang 重算
        updateHiddenFilesBtn();
        updateLineNumbersBtn();
        updateLangToggleBtn();
    }

    // ---------- 语言切换：与首页共用 localStorage('lang') ----------
    function updateLangToggleBtn() {
        const btn = document.getElementById('lang-toggle-viewer');
        if (!btn) return;
        const label = btn.querySelector('.si-label');
        if (label) {
            // 显示当前语言全称：zh → 「中文」，en → 「English」
            label.textContent = currentLang === 'zh' ? '中文' : 'English';
        }
        btn.setAttribute('aria-pressed', currentLang === 'zh' ? 'true' : 'false');
    }

    function initLangToggle() {
        const btn = document.getElementById('lang-toggle-viewer');
        if (!btn) return;
        updateLangToggleBtn();
        btn.addEventListener('click', () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('lang', currentLang);
            applyLang(currentLang);
            closeSettings();
        });
    }

    // ---------- 设置下拉菜单 ----------
    function closeSettings() {
        const m = document.getElementById('settings-menu');
        const t = document.getElementById('settings-trigger');
        if (!m || !t) return;
        m.classList.remove('open');
        t.setAttribute('aria-expanded', 'false');
    }
    function toggleSettings(e) {
        e.stopPropagation();
        const m = document.getElementById('settings-menu');
        const t = document.getElementById('settings-trigger');
        if (!m || !t) return;
        if (m.classList.contains('open')) closeSettings();
        else {
            m.classList.add('open');
            t.setAttribute('aria-expanded', 'true');
        }
    }
    function initSettings() {
        const trigger = document.getElementById('settings-trigger');
        if (trigger) trigger.addEventListener('click', toggleSettings);
        // 凭据/删除点击后自动关菜单；主题/隐藏文件/行号/源码/语言 项保持开
        document.querySelectorAll('.settings-item').forEach(b => {
            if (b.id !== 'theme-toggle-viewer' && b.id !== 'hidden-files-btn' && b.id !== 'line-numbers-btn' && b.id !== 'lang-toggle-viewer' && b.id !== 'view-source-btn') b.addEventListener('click', closeSettings);
        });
        document.addEventListener('click', (e) => {
            const m = document.getElementById('settings-menu');
            if (m && m.classList.contains('open') && !m.contains(e.target)) closeSettings();
        });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSettings(); });
    }

    // ---------- 隐藏文件（点开头）：默认隐藏，按需开启；不持久化 ----------
    let showHidden = false;

    function isHiddenFile(path) {
        // 路径任意一段以 . 开头即视为隐藏：既覆盖 .gitignore / .env 这类隐藏文件，
        // 也覆盖 .github/、.vscode/ 这类隐藏目录及其下的全部内容（避免目录节点漏过过滤后，
        // 连带子文件一起显示在树里）。
        return path.split('/').some(seg => seg.length > 0 && seg.charAt(0) === '.');
    }

    function visibleFiles() {
        if (showHidden) return allFiles;
        return allFiles.filter(f => !isHiddenFile(f.path));
    }

    function updateHiddenFilesBtn() {
        const btn = document.getElementById('hidden-files-btn');
        if (!btn) return;
        btn.classList.toggle('checked', showHidden);
        btn.setAttribute('aria-pressed', showHidden ? 'true' : 'false');
        // 文案 = 当前状态：隐藏中 → 「已隐藏」，显示中 → 「已显示」
        const label = btn.querySelector('.si-label');
        if (label) {
            const en = showHidden ? 'Hidden files: shown' : 'Hidden files: hidden';
            const zh = showHidden ? '隐藏文件：已显示' : '隐藏文件：已隐藏';
            label.textContent = currentLang === 'zh' ? zh : en;
            label.setAttribute('data-en', en);
            label.setAttribute('data-zh', zh);
        }
    }

    function initHiddenFilesToggle() {
        const btn = document.getElementById('hidden-files-btn');
        if (!btn) return;
        updateHiddenFilesBtn();
        btn.addEventListener('click', () => {
            showHidden = !showHidden;
            updateHiddenFilesBtn();
            renderTree(visibleFiles());
            closeSettings();
        });
    }

    // ---------- 行号：默认显示，按需关闭；不持久化 ----------
    // 仅作用于 <pre><code>（纯文本/代码），markdown 渲染结果（.markdown-body）忽略。
    let showLineNumbers = true;

    function updateLineNumbersBtn() {
        const btn = document.getElementById('line-numbers-btn');
        if (!btn) return;
        btn.classList.toggle('checked', showLineNumbers);
        btn.setAttribute('aria-pressed', showLineNumbers ? 'true' : 'false');
        // 文案 = 当前状态：有行号 → 「行号：开」，无行号 → 「行号：关」
        const label = btn.querySelector('.si-label');
        if (label) {
            const en = showLineNumbers ? 'Line numbers: on' : 'Line numbers: off';
            const zh = showLineNumbers ? '行号：开' : '行号：关';
            label.textContent = currentLang === 'zh' ? zh : en;
            label.setAttribute('data-en', en);
            label.setAttribute('data-zh', zh);
        }
    }

    function applyLineNumbers() {
        // 对每个 code-container 的 <pre><code> 套一层行号栅格（CSS 实现，不侵入内容）
        document.querySelectorAll('.code-container .code-content').forEach(content => {
            const pre = content.querySelector('pre');
            const code = pre && pre.querySelector('code');
            if (!pre || !code) return;
            if (showLineNumbers) {
                if (content.parentElement.classList.contains('has-line-numbers')) return; // 已套过
                content.parentElement.classList.add('has-line-numbers');
                const gutter = document.createElement('div');
                gutter.className = 'line-gutter';
                // 按当前 code 的实际行数生成行号；用 <br> 不靠谱，按 \n 切。
                const lineCount = code.textContent.split('\n').length;
                // 末尾若以 \n 结尾，textContent 会多算一个空行，与 <pre> 渲染一致，不扣减。
                let nums = '';
                for (let i = 1; i <= lineCount; i++) nums += (i) + '\n';
                gutter.textContent = nums;
                content.classList.add('with-gutter');
                content.insertBefore(gutter, pre);
            } else {
                const gutter = content.querySelector('.line-gutter');
                if (gutter) gutter.remove();
                content.classList.remove('with-gutter');
                content.parentElement.classList.remove('has-line-numbers');
            }
        });
    }

    function initLineNumbersToggle() {
        const btn = document.getElementById('line-numbers-btn');
        if (!btn) return;
        updateLineNumbersBtn();
        btn.addEventListener('click', () => {
            showLineNumbers = !showLineNumbers;
            updateLineNumbersBtn();
            applyLineNumbers();
            closeSettings();
        });
    }

    // ---------- 切换 ref 弹窗 ----------
    function openRefModal() {
        const modal = document.getElementById('ref-modal');
        const input = document.getElementById('ref-input');
        if (!modal || !input) return;
        modal.style.display = 'flex';
        input.value = currentRef;
        setTimeout(() => { input.focus(); input.select(); }, 0);
    }
    function closeRefModal() {
        const modal = document.getElementById('ref-modal');
        if (modal) modal.style.display = 'none';
    }
    function initRefSwitch() {
        const btn = document.getElementById('ref-switch-btn');
        if (btn) btn.addEventListener('click', openRefModal);
        const cancel = document.getElementById('ref-cancel');
        if (cancel) cancel.addEventListener('click', closeRefModal);
        const submit = document.getElementById('ref-submit');
        if (submit) submit.addEventListener('click', () => {
            const input = document.getElementById('ref-input');
            const val = (input && input.value || '').trim();
            if (!val) return;
            closeRefModal();
            switchRef(val);
        });
        // 点击遮罩关闭
        const modal = document.getElementById('ref-modal');
        if (modal) modal.addEventListener('click', (e) => { if (e.target === modal) closeRefModal(); });
    }

    // switchRef 切换到任意 ref（分支/tag/commit）：改 currentRef、更新顶部分支名、重载文件树。
    function switchRef(ref) {
        currentRef = ref;
        const nameEl = document.getElementById('branch-name');
        if (nameEl) nameEl.textContent = ref;
        const content = document.getElementById('floating-tree-content');
        if (content) content.innerHTML = '<div class="tree-loading">' + (currentLang === 'zh' ? '加载中...' : 'Loading...') + '</div>';
        loadFileTree().then(autoOpenDefault);
    }

    // ---------- 站点信息弹窗 ----------
    const siteInfo = {
        pathID: '{{ .PathID }}',
        gitUrl: '{{ .GitURL }}',
        provider: '{{ .Provider }}',
        ref: '{{ .Ref }}',
        hasPresetAuth: {{ if .HasPresetAuth }}true{{ else }}false{{ end }},
        createdAt: '{{ .CreatedAt }}',
        views: {{ .Views }},
        hidden: {{ if .Hidden }}true{{ else }}false{{ end }}
    };

    function initSiteInfo() {
        const btn = document.getElementById('site-info-btn');
        if (!btn) return;
        const hiddenToggle = document.getElementById('info-hidden-toggle');
        const hiddenLabel = document.getElementById('info-hidden-label');

        function updateHiddenLabel() {
            if (!hiddenLabel) return;
            const hidden = hiddenToggle ? hiddenToggle.checked : siteInfo.hidden;
            if (currentLang === 'zh') {
                hiddenLabel.textContent = hidden ? '隐藏（仅直链访问）' : '公开（出现在站点列表）';
            } else {
                hiddenLabel.textContent = hidden ? 'Hidden (link only)' : 'Public (listed in sites)';
            }
        }

        btn.addEventListener('click', () => {
            document.getElementById('info-giturl').textContent = siteInfo.gitUrl || '—';
            document.getElementById('info-provider').textContent = siteInfo.provider || '—';
            document.getElementById('info-ref').textContent = siteInfo.ref || '—';
            // 凭据：预置=私有仓库已配置凭据；否则检查浏览器保存状态
            let authTxt;
            if (siteInfo.hasPresetAuth) {
                authTxt = currentLang === 'zh' ? '已预置（私有仓库）' : 'Preset (private repo)';
            } else {
                const si = getSavedAuthInfo();
                if (si.has) {
                    authTxt = currentLang === 'zh' ? ('已保存（剩余 ' + si.daysLeft + ' 天）') : ('Saved (' + si.daysLeft + ' days left)');
                } else if (getStoredAuth()) {
                    authTxt = currentLang === 'zh' ? '本会话有效' : 'This session';
                } else {
                    authTxt = currentLang === 'zh' ? '无预置（访问时按需输入）' : 'None (enter on 401)';
                }
            }
            document.getElementById('info-auth').textContent = authTxt;
            document.getElementById('info-created').textContent = siteInfo.createdAt || '—';
            document.getElementById('info-views').textContent = siteInfo.views;
            if (hiddenToggle) {
                hiddenToggle.checked = siteInfo.hidden;
                updateHiddenLabel();
            }
            document.getElementById('info-modal').style.display = 'flex';
            closeSettings();
        });

        if (hiddenToggle) {
            hiddenToggle.addEventListener('change', async () => {
                const hidden = hiddenToggle.checked;
                updateHiddenLabel();
                try {
                    const resp = await fetch('/api/sites/' + siteInfo.pathID + '/hidden', {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ hidden: hidden })
                    });
                    if (!resp.ok) {
                        const data = await resp.json().catch(() => ({}));
                        throw new Error(data.error || 'HTTP ' + resp.status);
                    }
                    siteInfo.hidden = hidden;
                    toast.success(currentLang === 'zh' ? '已更新' : 'Updated');
                } catch (err) {
                    hiddenToggle.checked = siteInfo.hidden;
                    updateHiddenLabel();
                    toast.error(currentLang === 'zh' ? '更新失败: ' + err.message : 'Failed: ' + err.message);
                }
            });
        }

        const closeBtn = document.getElementById('info-close');
        if (closeBtn) closeBtn.addEventListener('click', () => {
            document.getElementById('info-modal').style.display = 'none';
        });
        const modal = document.getElementById('info-modal');
        if (modal) modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
    }

    // 显示源代码 / 下载文件：作用于当前已加载的文件
    function initFileActions() {
        const srcBtn = document.getElementById('view-source-btn');
        const dlBtn = document.getElementById('download-file-btn');
        // 取当前文件名（basename），兼容 / 与 \
        function basename(p) {
            if (!p) return '';
            const i = Math.max(p.lastIndexOf('/'), p.lastIndexOf('\\'));
            return i >= 0 ? p.slice(i + 1) : p;
        }
        // 切换「显示源代码 / 显示渲染」按钮文案 + checked 态
        function setSrcLabel(sourceMode) {
            if (!srcBtn) return;
            const label = srcBtn.querySelector('.si-label');
            if (sourceMode) {
                if (label) label.textContent = currentLang === 'zh' ? '显示渲染' : 'Show rendered';
                srcBtn.classList.add('checked');
            } else {
                if (label) label.textContent = currentLang === 'zh' ? '显示源代码' : 'View source';
                srcBtn.classList.remove('checked');
            }
        }
        if (srcBtn) srcBtn.addEventListener('click', async () => {
            if (!currentPath) {
                toast.info(currentLang === 'zh' ? '请先选择一个文件' : 'Please select a file first');
                return;
            }
            // 已在源码模式 → 切回渲染
            if (viewSourceMode) {
                viewSourceMode = false;
                setSrcLabel(false);
                loadFile(currentPath);
                return;
            }
            // 图片无源码概念
            if (/\.(png|jpe?g|gif|bmp|webp|svg|ico)$/i.test(currentPath)) {
                toast.info(currentLang === 'zh' ? '图片不支持显示源码' : 'Source view not available for images');
                return;
            }
            viewSourceMode = true;
            setSrcLabel(true);
            loadFileSource(currentPath);
        });
        if (dlBtn) dlBtn.addEventListener('click', async () => {
            if (!currentPath) {
                toast.info(currentLang === 'zh' ? '请先选择一个文件' : 'Please select a file first');
                closeSettings();
                return;
            }
            // 用 raw=1 拿原始字节（否则 .md/.html 会下载渲染后的 HTML 片段）
            try {
                const resp = await authFetch('/' + pathID + '/' + encodeURI(currentPath) + refQuery() + '&raw=1');
                if (!resp.ok) {
                    toast.error(httpErrorMsg(resp, '下载失败（' + resp.status + '）', 'Download failed (' + resp.status + ')'));
                    closeSettings();
                    return;
                }
                const blob = await resp.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = basename(currentPath) || 'download';
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => URL.revokeObjectURL(a.href), 1000);
            } catch (err) {
                toast.error(currentLang === 'zh' ? '下载失败: ' + err.message : 'Download failed: ' + err.message);
            }
            closeSettings();
        });
        const shareBtn = document.getElementById('share-page-btn');
        if (shareBtn) shareBtn.addEventListener('click', () => {
            if (!currentPath) {
                toast.info(currentLang === 'zh' ? '请先选择一个文件' : 'Please select a file first');
                return;
            }
            // 分享链接 = 独立渲染页面（?embed=1 走 standalone 模板，只渲染文件内容）
            const url = location.origin + '/' + pathID + '/' + encodeURI(currentPath) + refQuery() + '&embed=1';
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(() => {
                    toast.success(currentLang === 'zh' ? '已复制分享链接' : 'Share link copied');
                }).catch(() => {
                    window.open(url, '_blank');
                });
            } else {
                window.open(url, '_blank');
            }
            closeSettings();
        });
    }

    initTheme();
    applyLang(currentLang);
    initSettings();
    initLangToggle();
    initHiddenFilesToggle();
    initLineNumbersToggle();
    initRefSwitch();
    initSiteInfo();
    initFileActions();

    // 拼到所有 fetch URL 上的 ?ref=，让后端用当前分支取数据（含默认分支，保持缓存键一致）。
    function refQuery() {
        return '?ref=' + encodeURIComponent(currentRef);
    }

    // ---------- 凭据（sessionStorage 本会话 / localStorage 持久 7 天） ----------
    // 运行时只读 sessionStorage（与原行为一致，保证用户刚输入的凭据立即生效）。
    // localStorage 仅用于页面加载时跨会话恢复 → 恢复到 sessionStorage 后就不再读取。
    function getStoredAuth() {
        try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY)); } catch (e) { return null; }
    }
    // 页面加载时从 localStorage 恢复持久凭据到 sessionStorage（一次性）
    function restoreAuthFromLocal() {
        try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY_LOCAL));
            if (saved && saved.expiresAt && Date.now() < saved.expiresAt) {
                sessionStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
                // 恢复持久凭据时也补一份 cookie
                var cookieVal = btoa(unescape(encodeURIComponent(JSON.stringify(saved))));
                document.cookie = 'gitweb_repo_auth_' + pathID + '=' + cookieVal + '; path=/; max-age=' + (SAVE_DAYS * 86400) + '; SameSite=Lax';
                return true;
            }
            if (saved) localStorage.removeItem(STORAGE_KEY_LOCAL);
        } catch (e) {}
        return false;
    }
    // persist=true → 存 localStorage 并带 7 天过期；false → 仅 sessionStorage 并清掉旧持久记录
    function storeAuth(auth, persist) {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(auth));
        // 同步写一份 base64 cookie 给后端兜底用：浏览器导航（地址栏、<a>、<img>、iframe src）
        // 不会带 Authorization 头，但会带同源 cookie，后端可从 cookie 恢复 auth。
        var cookieName = 'gitweb_repo_auth_' + pathID;
        var cookieVal = btoa(unescape(encodeURIComponent(JSON.stringify(auth))));
        var maxAge = persist ? (SAVE_DAYS * 86400) : (4 * 3600); // 持久 7 天，会话 4 小时
        document.cookie = cookieName + '=' + cookieVal + '; path=/; max-age=' + maxAge + '; SameSite=Lax';
        if (persist) {
            auth.expiresAt = Date.now() + SAVE_DAYS * 86400000;
            localStorage.setItem(STORAGE_KEY_LOCAL, JSON.stringify(auth));
        } else {
            localStorage.removeItem(STORAGE_KEY_LOCAL);
        }
    }
    // 清除全部凭据（持久 + 会话 + cookie），用于保存的凭据失效时
    function clearAllAuth() {
        localStorage.removeItem(STORAGE_KEY_LOCAL);
        sessionStorage.removeItem(STORAGE_KEY);
        document.cookie = 'gitweb_repo_auth_' + pathID + '=; path=/; max-age=0';
    }
    // 检查是否有有效的持久凭据（用于预填勾选框 & 站点信息展示）
    function getSavedAuthInfo() {
        try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY_LOCAL));
            if (saved && saved.expiresAt && Date.now() < saved.expiresAt) {
                const left = Math.ceil((saved.expiresAt - Date.now()) / 86400000);
                return { has: true, daysLeft: left };
            }
            if (saved) localStorage.removeItem(STORAGE_KEY_LOCAL);
        } catch (e) {}
        return { has: false };
    }
    function authHeader() {
        const a = getStoredAuth();
        if (!a) return {};
        if (a.type === 'token') return { 'Authorization': 'Bearer ' + a.token };
        if (a.type === 'basic') return { 'Authorization': 'Basic ' + btoa(a.username + ':' + a.password) };
        return {};
    }

    // 带鉴权的 fetch：401 时弹窗要凭据，输入后重试。循环直到成功或用户取消。
    async function authFetch(url, opts) {
        opts = opts || {};
        opts.headers = Object.assign({}, opts.headers || {}, authHeader());
        let resp = await fetch(url, opts);
        while (resp.status === 401) {
            const prevAuth = getStoredAuth();
            sessionStorage.removeItem(STORAGE_KEY);
            // 后端若失败，也清掉兜底 cookie，避免持续误导下次导航请求
            document.cookie = 'gitweb_repo_auth_' + pathID + '=; path=/; max-age=0';
            authFailed = !!prevAuth;
            lastFailedType = prevAuth ? prevAuth.type : null;
            const auth = await promptAuth();
            if (!auth) break; // 用户取消 → 返回 401
            authFailed = false;
            lastFailedType = null;
            // 重新构造完整 headers：清掉旧的 Authorization，用新凭据
            const baseHeaders = {};
            for (const k in opts.headers) {
                if (k.toLowerCase() !== 'authorization') baseHeaders[k] = opts.headers[k];
            }
            opts.headers = Object.assign(baseHeaders, authHeader());
            resp = await fetch(url, opts);
        }
        return resp;
    }

    // 弹出凭据输入框，返回 Promise（用户确认后 resolve auth 对象，取消则 resolve null）
    function promptAuth() {
        if (authResolve) return authResolve; // 已有弹窗
        const modal = document.getElementById('auth-modal');
        modal.style.display = 'flex';
        // 根据 authFailed 显示/隐藏错误提示
        const errEl = document.getElementById('auth-error');
        if (errEl) {
            if (authFailed) {
                let msg;
                if (lastFailedType === 'basic') {
                    // 账号密码失败：常见原因是 Gitea/GitLab 禁用了 Basic Auth
                    msg = currentLang === 'zh'
                        ? '账号密码无效。此站点可能禁用了 Basic Auth，请改用 Personal Access Token（在 Gitea 设置 → 应用 → 生成令牌）'
                        : 'Username/password failed. This site may have disabled Basic Auth — please use a Personal Access Token (Gitea Settings → Applications → Generate Token)';
                } else {
                    msg = currentLang === 'zh'
                        ? '上次输入的凭据无效，请重新输入'
                        : 'Previous credentials were invalid, please try again';
                }
                errEl.textContent = msg;
                errEl.style.display = 'block';
            } else {
                errEl.style.display = 'none';
            }
        }
        return new Promise(resolve => {
            authResolve = resolve;
        });
    }
    function closeAuth(auth) {
        document.getElementById('auth-modal').style.display = 'none';
        const resolve = authResolve;
        authResolve = null;
        if (resolve) resolve(auth);
    }

    document.getElementById('auth-type').addEventListener('change', e => {
        const t = e.target.value;
        document.getElementById('auth-token').style.display = t === 'token' ? 'block' : 'none';
        document.getElementById('auth-username').style.display = t === 'basic' ? 'block' : 'none';
        document.getElementById('auth-password').style.display = t === 'basic' ? 'block' : 'none';
    });
    document.getElementById('auth-cancel').addEventListener('click', () => { authFromButton = false; closeAuth(null); });
    document.getElementById('auth-submit').addEventListener('click', () => {
        const type = document.getElementById('auth-type').value;
        const auth = { type };
        if (type === 'token') auth.token = document.getElementById('auth-token').value;
        else { auth.username = document.getElementById('auth-username').value; auth.password = document.getElementById('auth-password').value; }
        const persist = document.getElementById('auth-save-local').checked;
        storeAuth(auth, persist);
        const fromButton = authFromButton;
        authFromButton = false;
        closeAuth(auth);
        // 由「凭据」按钮触发的提交：用户主动更换凭据后，重载文件树以应用新凭据。
        // 401 自动触发的弹窗不需要这里重载——authFetch 会自行重试当前请求。
        if (fromButton) {
            const content = document.getElementById('floating-tree-content');
            if (content) content.innerHTML = '<div class="tree-loading">' + (currentLang === 'zh' ? '加载中...' : 'Loading...') + '</div>';
            loadFileTree().then(autoOpenDefault);
            toast.success(currentLang === 'zh' ? '凭据已保存，正在重新加载' : 'Credentials saved, reloading');
        }
    });

    // 顶部「凭据」按钮：主动打开凭据输入框（用于私有仓库报错后手动输入，或更换凭据）。
    // 预填已保存的凭据，便于查看/修改而非从零输入。
    const authSiteBtn = document.getElementById('auth-site-btn');
    if (authSiteBtn) {
        authSiteBtn.addEventListener('click', () => {
            const saved = getStoredAuth();
            const savedInfo = getSavedAuthInfo();
            // 预填勾选框：有持久凭据则默认勾选
            document.getElementById('auth-save-local').checked = savedInfo.has;
            if (saved) {
                document.getElementById('auth-type').value = saved.type || 'token';
                document.getElementById('auth-type').dispatchEvent(new Event('change'));
                if (saved.type === 'basic') {
                    document.getElementById('auth-username').value = saved.username || '';
                    document.getElementById('auth-password').value = saved.password || '';
                } else {
                    document.getElementById('auth-token').value = saved.token || '';
                }
            }
            authFromButton = true;
            authFailed = false; // 按钮触发是全新输入，不显示"上次无效"提示
            lastFailedType = null;
            promptAuth();
        });
    }

    // ---------- 文件树 ----------
    async function loadFileTree() {
        const content = document.getElementById('floating-tree-content');
        const zh = currentLang === 'zh';
        try {
            const resp = await authFetch('/api/sites/' + pathID + '/tree' + refQuery());
            if (!resp.ok) {
                allFiles = [];
                const msg = httpErrorMsg(resp, '加载文件树失败（' + resp.status + '）', 'Failed to load tree (' + resp.status + ')');
                if (content) content.innerHTML = '<div class="tree-error">' + msg + '</div>';
                toast.error(msg);
                return;
            }
            const data = await resp.json();
            allFiles = data.files || [];
            renderTree(visibleFiles());
        } catch (err) {
            allFiles = []; // 清空旧分支文件列表，避免 autoOpenDefault 用过期列表发请求
            const msg = zh ? '加载文件树失败: ' + err.message : 'Failed to load tree: ' + err.message;
            if (content) content.innerHTML = '<div class="tree-error">' + msg + '</div>';
            toast.error(msg);
        }
    }

    function buildTree(files) {
        const root = { _files: [], _dirs: {} };
        files.forEach(file => {
            const parts = file.path.split('/');
            let cur = root;
            for (let i = 0; i < parts.length - 1; i++) {
                if (!cur._dirs[parts[i]]) cur._dirs[parts[i]] = { _files: [], _dirs: {} };
                cur = cur._dirs[parts[i]];
            }
            cur._files.push({ name: parts[parts.length - 1], path: file.path, size: file.size });
        });
        return root;
    }

    function renderTree(files) {
        const container = document.getElementById('floating-tree-content');
        if (!files.length) { container.innerHTML = '<div class="tree-empty">' + (currentLang === 'zh' ? '空仓库' : 'Empty repo') + '</div>'; return; }
        container.innerHTML = renderNode(buildTree(files), 0);
        attachTreeEvents();
    }

    // 图标内联 SVG（class 受 CSS 控制，颜色随状态切换）
    const ICON = {
        chevron: '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>',
        chevronSpacer: '<span class="chevron-spacer" aria-hidden="true"></span>',
        folder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
        file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>'
    };

    function renderNode(node, level) {
        let html = '';
        Object.keys(node._dirs).sort().forEach(dir => {
            html += '<div class="folder-item" data-level="' + level + '" style="padding-left:' + (level * 14 + 6) + 'px">'
                + ICON.chevron + '<span class="folder-icon">' + ICON.folder + '</span><span class="folder-name">' + escapeHtml(dir) + '</span></div>'
                + '<div class="folder-children" style="display:none">' + renderNode(node._dirs[dir], level + 1) + '</div>';
        });
        node._files.sort((a, b) => a.name.localeCompare(b.name));
        node._files.forEach(file => {
            html += '<div class="file-item" data-path="' + escapeHtml(file.path) + '" data-level="' + level + '" style="padding-left:' + (level * 14 + 6) + 'px">'
                + ICON.chevronSpacer + '<span class="file-icon">' + ICON.file + '</span><span class="file-name">' + escapeHtml(file.name) + '</span>'
                + '<span class="file-size">' + (file.size > 0 ? formatSize(file.size) : '') + '</span></div>';
        });
        return html;
    }

    function attachTreeEvents() {
        document.querySelectorAll('.file-item').forEach(item => {
            item.addEventListener('click', () => {
                const path = item.dataset.path;
                loadFile(path);
                document.querySelectorAll('.file-item').forEach(f => f.classList.remove('active'));
                item.classList.add('active');
            });
        });
        document.querySelectorAll('.folder-item').forEach(item => {
            item.addEventListener('click', () => {
                const next = item.nextElementSibling;
                if (next && next.classList.contains('folder-children')) {
                    const open = next.style.display !== 'none';
                    next.style.display = open ? 'none' : 'block';
                    item.classList.toggle('open', !open);
                }
            });
        });
    }

    // ---------- 文件加载 ----------
    // 以源码模式加载文件（raw=1 拿原始字节，pre/code 展示）。供「显示源代码」按钮和
    // 源码模式下切换文件复用。图片无源码概念，调用方应自行跳过。
    async function loadFileSource(path) {
        const area = document.getElementById('content-area');
        area.innerHTML = '<div class="welcome">' + (currentLang === 'zh' ? '加载源码...' : 'Loading source...') + '</div>';
        try {
            const resp = await authFetch('/' + pathID + '/' + encodeURI(path) + refQuery() + '&raw=1');
            if (!resp.ok) {
                const msg = httpErrorMsg(resp, '加载失败（' + resp.status + '）', 'Failed (' + resp.status + ')');
                area.innerHTML = '<div class="error">' + msg + '</div>';
                toast.error(msg);
                return;
            }
            const text = await resp.text();
            renderTextWithPagination(area, path, '<pre><code>' + escapeHtml(text) + '</code></pre>');
        } catch (err) {
            const msg = currentLang === 'zh' ? '加载失败: ' + err.message : 'Failed: ' + err.message;
            area.innerHTML = '<div class="error">' + msg + '</div>';
            toast.error(msg);
        }
    }

    async function loadFile(path) {
        currentPath = path;
        const area = document.getElementById('content-area');
        // 源码模式下切换文件：保持源码模式（图片无源码，走正常渲染）
        if (viewSourceMode && !/\.(png|jpe?g|gif|bmp|webp|svg|ico)$/i.test(path)) {
            loadFileSource(path);
            return;
        }
        area.innerHTML = '<div class="welcome">' + (currentLang === 'zh' ? '加载中...' : 'Loading...') + '</div>';

        const lower = path.toLowerCase();
        try {
            // HTML：iframe sandbox 承载（不加 allow-scripts，防恶意脚本逃逸）
            if (lower.endsWith('.html') || lower.endsWith('.htm')) {
                renderHTMLInIframe(path);
                return;
            }
            // 图片：直接 <img>
            if (/\.(png|jpe?g|gif|bmp|webp|svg|ico)$/i.test(path)) {
                area.innerHTML = '<div class="image-container"><img src="/' + pathID + '/' + encodeURI(path) + refQuery() + '" alt="' + escapeHtml(path) + '"></div>';
                return;
            }
            // md/txt/代码：后端返回 HTML 片段，前端注入。长内容前端分页。
            const resp = await authFetch('/' + pathID + '/' + encodeURI(path) + refQuery());
            if (!resp.ok) {
                const msg = httpErrorMsg(resp, '加载失败（' + resp.status + '）', 'Failed to load (' + resp.status + ')');
                area.innerHTML = '<div class="error">' + msg + '</div>';
                toast.error(msg);
                return;
            }
            const html = await resp.text();
            renderTextWithPagination(area, path, html);
        } catch (err) {
            const msg = currentLang === 'zh' ? '加载失败: ' + err.message : 'Failed to load: ' + err.message;
            area.innerHTML = '<div class="error">' + msg + '</div>';
            toast.error(msg);
        }
    }

    function renderHTMLInIframe(path) {
        const area = document.getElementById('content-area');
        area.innerHTML = '<div class="welcome">' + (currentLang === 'zh' ? '加载中...' : 'Loading...') + '</div>';

        const fileURL = '/' + pathID + '/' + encodeURI(path) + refQuery();
        const openText = currentLang === 'zh' ? '在新标签页打开' : 'Open in new tab';
        const srcText = currentLang === 'zh' ? '查看源码' : 'View source';

        authFetch(fileURL).then(async resp => {
            if (!resp.ok) {
                const msg = httpErrorMsg(resp, '加载失败（' + resp.status + '）', 'Failed to load (' + resp.status + ')');
                area.innerHTML = '<div class="error">' + msg + '</div>';
                toast.error(msg);
                return;
            }
            const html = await resp.text();

            const notice = document.createElement('div');
            notice.className = 'html-notice';
            const noticeText = currentLang === 'zh'
                ? '⚠️ HTML 在隔离的沙箱中显示（禁用脚本）。'
                : '⚠️ HTML is shown in a sandboxed iframe (scripts disabled).';
            notice.innerHTML = noticeText
                + '<a href="' + fileURL + '" target="_blank">' + openText + '</a>'
                + '<a href="' + fileURL + (fileURL.indexOf('?') >= 0 ? '&' : '?') + 'raw=1" target="_blank">' + srcText + '</a>';

            const iframe = document.createElement('iframe');
            iframe.className = 'html-frame';
            // 用 srcdoc 注入内容：这样鉴权头只走主页面 fetch，不依赖 iframe 自身请求。
            // 同时 sandbox 不加 allow-scripts，防止不可信仓库的恶意脚本逃逸。
            iframe.setAttribute('sandbox', 'allow-same-origin');
            iframe.srcdoc = html;
            area.innerHTML = '';
            area.appendChild(notice);
            area.appendChild(iframe);
        }).catch(err => {
            const msg = currentLang === 'zh' ? '加载失败: ' + err.message : 'Failed to load: ' + err.message;
            area.innerHTML = '<div class="error">' + msg + '</div>';
            toast.error(msg);
        });
    }

    // 前端分页：按渲染片段的行数切，每页 maxLines 行。
    function renderTextWithPagination(area, path, html) {
        // html 是后端渲染的片段（<pre><code>... 或 markdown 的 HTML）
        // 检测是否为 <pre><code>（纯文本），按行切；markdown 内容不分页（避免截断标签）
        if (html.startsWith('<pre><code>')) {
            const raw = html.slice('<pre><code>'.length, html.length - '</code></pre>'.length);
            const lines = raw.split('\n');
            const maxLines = 1000;
            if (lines.length <= maxLines) {
                area.innerHTML = '<div class="code-container"><div class="code-content"><pre><code>' + raw + '</code></pre></div></div>';
                applyLineNumbers();
                return;
            }
            let page = 0;
            const totalPages = Math.ceil(lines.length / maxLines);
            function renderPage(p) {
                const start = p * maxLines, end = Math.min(start + maxLines, lines.length);
                const pageContent = lines.slice(start, end).join('\n');
                const container = document.createElement('div');
                container.className = 'code-container';
                const zh = currentLang === 'zh';
                const linesLabel = zh ? '行' : 'Lines';
                const pageLabel = zh ? '第' : 'Page';
                const pageMid = zh ? ' / ' + totalPages + ' 页' : ' / ' + totalPages;
                const prevLabel = zh ? '上一页' : 'Prev';
                const nextLabel = zh ? '下一页' : 'Next';
                container.innerHTML = '<div class="code-header"><span class="code-filename">' + escapeHtml(path)
                    + ' (' + linesLabel + ' ' + (start + 1) + '-' + end + ' / ' + lines.length + ')</span></div>'
                    + '<div class="code-content"><pre><code>' + pageContent + '</code></pre></div>';
                const pager = document.createElement('div');
                pager.className = 'pagination';
                pager.innerHTML = '<button ' + (p === 0 ? 'disabled' : '') + ' data-p="' + (p - 1) + '">' + prevLabel + '</button>'
                    + '<span>' + pageLabel + ' ' + (p + 1) + pageMid + '</span>'
                    + '<button ' + (p === totalPages - 1 ? 'disabled' : '') + ' data-p="' + (p + 1) + '">' + nextLabel + '</button>';
                pager.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
                    const np = parseInt(b.dataset.p, 10);
                    if (!isNaN(np)) renderPage(np);
                }));
                container.appendChild(pager);
                area.innerHTML = '';
                area.appendChild(container);
                applyLineNumbers(); // 分页切页后重挂行号
                area.scrollTop = 0;
            }
            renderPage(page);
        } else {
            // markdown 渲染结果：直接注入（不分页，goldmark 已是结构化 HTML）
            area.innerHTML = '<div class="markdown-body">' + html + '</div>';
        }
    }

    // ---------- 首屏：自动加载 README ----------
    function autoOpenDefault() {
        const candidates = ['README.md', 'readme.md', 'README.MD', 'index.html', 'README.txt', 'README'];
        for (const c of candidates) {
            if (allFiles.some(f => f.path === c)) {
                loadFile(c);
                // 高亮文件树
                const target = document.querySelector('.file-item[data-path="' + c + '"]');
                if (target) target.classList.add('active');
                return;
            }
        }
    }

    // ---------- 浮窗交互 ----------
    // 位置持久化：气泡、窗口各自的 left/top 存 localStorage。
    const POS_KEY = 'gitweb_viewer_pos';
    function loadPos() { try { return JSON.parse(localStorage.getItem(POS_KEY)) || {}; } catch (e) { return {}; } }
    function savePos(patch) {
        const cur = loadPos();
        localStorage.setItem(POS_KEY, JSON.stringify(Object.assign(cur, patch)));
    }

    // 通用拖动：在 handle(s) 上按下时移动 el。handle 可为元素或数组。
    // onMove 可选，用于实时存储位置 / 边缘吸附反馈；阈值过滤纯点击（移动小于 4px 视为点击）。
    // opts.allowOverflow: 允许拖出视口（用于贴边半隐入）。onMove 收到 (x,y,edge)，edge 为最近边
    // 'left'|'right'|'top'|'bottom' 及到该边距离 dist；onEnd 收到 (moved, x, y, edge, dist)。
    function makeDraggable(el, handle, opts) {
        opts = opts || {};
        const handles = Array.isArray(handle) ? handle : [handle];
        let dragging = false, startX = 0, startY = 0, ox = 0, oy = 0, moved = false;
        let lastX = 0, lastY = 0, lastEdge = null, lastDist = Infinity;

        const down = (clientX, clientY, e) => {
            if (opts.ignoreOn && opts.ignoreOn(e)) return;
            dragging = true; moved = false;
            startX = clientX; startY = clientY;
            const r = el.getBoundingClientRect();
            ox = clientX - r.left; oy = clientY - r.top;
            el.classList.add('dragging');
            if (opts.onStart) opts.onStart();
        };
        const move = (clientX, clientY) => {
            if (!dragging) return;
            const dx = clientX - startX, dy = clientY - startY;
            if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
            const w = el.offsetWidth, h = el.offsetHeight;
            let x = clientX - ox, y = clientY - oy;
            if (opts.allowOverflow) {
                // 允许部分超出视口（贴边半隐入），但仍保留至少一部分可见
                x = Math.max(-w + 16, Math.min(x, window.innerWidth - 16));
                y = Math.max(-h + 16, Math.min(y, window.innerHeight - 16));
            } else {
                x = Math.max(0, Math.min(x, window.innerWidth - w));
                y = Math.max(0, Math.min(y, window.innerHeight - h));
            }
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.right = 'auto'; el.style.bottom = 'auto';
            // 计算元素边缘到视口边缘的距离（允许负数=超出）
            const edges = {
                left: x, right: window.innerWidth - (x + w),
                top: y, bottom: window.innerHeight - (y + h)
            };
            let edge = 'left', dist = edges.left;
            for (const k in edges) { if (edges[k] < dist) { dist = edges[k]; edge = k; } }
            lastX = x; lastY = y; lastEdge = edge; lastDist = dist;
            if (opts.onMove) opts.onMove(x, y, edge, dist);
        };
        const up = () => {
            if (!dragging) return;
            dragging = false;
            el.classList.remove('dragging');

            h.addEventListener('mousedown', e => { down(e.clientX, e.clientY, e); e.preventDefault(); });

            didMove: () => moved,
            resetMoved: () => { moved = false; }
        };
    }

    function initFloatingTree() {
        const win = document.getElementById('floating-tree-window');
        const titlebar = document.getElementById('floating-tree-titlebar');
        const minimize = document.getElementById('minimize-btn');
        const minDock = document.getElementById('min-dock');
        if (!win) return;

        // 同步真实 header 高度到 CSS 变量 --header-h，供 dock 侧栏顶部位置与标题栏高度对齐。
        // viewer-header 高度随内容/字号变化，写死 52px 会让 dock 分隔线与页头下边框错位。
        function syncHeaderH() {
            const h = document.querySelector('.viewer-header');
            if (!h) return;
            const real = Math.round(h.getBoundingClientRect().height);
            if (real > 0) document.documentElement.style.setProperty('--header-h', real + 'px');

        }

        const SNAP_DIST = 12;        // 元素边缘离视口边 ≤ 此值才吸附（像素）
        const DOCK_SIZE = 48;        // 迷你浮岛逻辑尺寸（与 CSS 一致；视觉缩放靠 transform）
        const EASE = 'cubic-bezier(0.16, 1, 0.3, 1)';      // 苹果大形变缓动

        // 恢复窗口位置/尺寸
        if (pos.winLeft != null) { win.style.left = pos.winLeft + 'px'; win.style.top = pos.winTop + 'px'; win.style.right = 'auto'; }
        if (pos.winWidth != null) win.style.width = pos.winWidth + 'px';
        if (pos.winHeight != null) win.style.height = pos.winHeight + 'px';

        // ---- 窗口拖动（仅标题栏；展开态） ----
        makeDraggable(win, titlebar, {
            ignoreOn: e => e.target.closest('button') != null, // 点按钮不拖
            onMove: (x, y) => savePos({ winLeft: x, winTop: y })
        });

        // 仅在浮窗态保存尺寸；docked 态的尺寸由 --dock-w/--dock-h 管理，不应覆盖浮窗尺寸

                    }
                }
            });

        }

        // ---- FLIP 形变：把"宽高变化"合成成一次 transform 动画，不 reflow、不闪烁。
        // 记录 First(旧 rect) → 切到目标态读 Last(新 rect) → Invert(transform 把新态拉回旧视觉)
        // → Play(下一帧 transform 过渡到目标态的 transform)。
        function flipMorph(applyTarget, done) {
            const first = win.getBoundingClientRect();
            applyTarget();                       // 切 class / 设尺寸
            // 尊重 prefers-reduced-motion：直接到位，不做 FLIP 动画
            const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (reduceMotion) { if (done) done(); return; }
            // 强制布局，读 Last
            const last = win.getBoundingClientRect();
            const sx = first.width / last.width;
            const sy = first.height / last.height;
            const dx = first.left - last.left;
            const dy = first.top - last.top;
            if (!isFinite(sx) || !isFinite(sy) || (sx === 1 && sy === 1 && dx === 0 && dy === 0)) {
                if (done) done(); return;
            }
            // 目标态自身的 transform（如吸附 scale）；FLIP 的位移/缩放叠加其上
            const targetTx = getComputedStyle(win).transform;
            const base = targetTx === 'none' ? '' : targetTx;
            win.classList.add('morphing');
            win.style.transition = 'none';
            // Invert：在新位置上用 transform 还原到旧视觉
            win.style.transform = base + ' translate(' + dx + 'px,' + dy + 'px) scale(' + sx + ',' + sy + ')';
            // 强制 commit Invert 态
            win.getBoundingClientRect();
            // Play：下一帧切到目标 transform，带缓动
            requestAnimationFrame(() => {
                win.style.transition = 'transform 0.34s ' + EASE;
                win.style.transform = base;      // 回到目标态
                // 让 min-dock 图标在收缩接近收尾时淡入（minimize），
                // 或淡出回复展开（restore）：旋转方向靠是否已 minimized
                win.classList.add('morphing-icon-in');
            });
            const finish = () => {
                win.classList.remove('morphing');
                win.classList.remove('morphing-icon-in');
                win.style.transition = '';
                win.style.transform = '';
                if (done) done();
            };
            win.addEventListener('transitionend', function te(e) {
                if (e.propertyName !== 'transform') return;
                win.removeEventListener('transitionend', te);
                finish();
            });

        // ---- 缩为迷你浮岛（带 FLIP） ----
        function toMiniIsland(skipAnim) {

            if (pos.dockLeft == null) {
                const x = window.innerWidth - 56, y = window.innerHeight - 56;
                pos.dockLeft = x; pos.dockTop = y; pos.dockSnap = null;
            } else {
                // 已有保存位置：检查是否还在当前视口内（横竖屏切换后可能越界）

                if (pos.dockLeft > window.innerWidth - w || pos.dockTop > window.innerHeight - h ||

                    pos.dockLeft = window.innerWidth - 56;
                    pos.dockTop = window.innerHeight - 56;
                    pos.dockSnap = null;
                }
            }
            const apply = () => {
                applyDockPos(pos.dockLeft, pos.dockTop, pos.dockSnap);
                win.classList.add('minimized');

                win.style.animation = 'none';

                win.style.animation = '';

            }

        function fromMiniIsland() {

                    && pos.winTop != null && pos.winTop >= 0 && pos.winTop <= vh - 40;

                }

        // ---- 停靠态（DevTools 风格：左 / 底 / 右） ----

        const dockSideMenu = document.getElementById('dock-side-menu');
        const contentArea = document.getElementById('content-area');

        function dockTo(side) {
            // 清掉浮岛态残留 class 与内联位置（停靠态由 CSS 接管定位）
            win.classList.remove('minimized', 'snapped', 'snap-left', 'snap-right', 'snap-top', 'snap-bottom');
            win.style.left = ''; win.style.top = ''; win.style.right = ''; win.style.bottom = ''; win.style.width = ''; win.style.height = '';
            win.classList.remove('docked-left', 'docked-right', 'docked-bottom');
            win.classList.add('docked', 'docked-' + side);
            restoreDockSize();
            applyContentInset(side);
            pos.dockSide = side;
            savePos({ dockSide: side });
            hideDockMenu();
            // 显示标题栏切换按钮
            if (dockSwitchBtn) dockSwitchBtn.style.display = 'flex';
        }
        function undock(restoreX, restoreY) {
            win.classList.remove('docked', 'docked-left', 'docked-right', 'docked-bottom');
            clearContentInset();
            pos.dockSide = null;
            savePos({ dockSide: null });
            // 隐藏标题栏切换按钮
            if (dockSwitchBtn) dockSwitchBtn.style.display = 'none';
            hideDockMenu();
            // 恢复到浮窗态：优先用拖拽撕下来的位置，否则回上次保存的窗口位置，再否则回 CSS 默认
            if (restoreX != null) {

                savePos({ winLeft: restoreX, winTop: restoreY });

                win.style.left = pos.winLeft + 'px'; win.style.top = pos.winTop + 'px'; win.style.right = 'auto';

        function applyContentInset(side) {

            if (side === 'bottom') contentArea.style.paddingBottom = (h + 12) + 'px';

            contentArea.style.paddingLeft = '';
            contentArea.style.paddingRight = '';
            contentArea.style.paddingBottom = '';

        // 鼠标靠近停靠浮窗的可拖拽边缘（12px 检测区）时启动 resize。

        // 注意：检测区 24px（触屏 32px）更易抓取；cursor 由 CSS ::after hot zone 提示。
        let resizing = false, resizeStart = 0, resizeStartSize = 0, resizeSide = null;
        function startResize(e) {

            if (side === 'left' && Math.abs(e.clientX - r.right) < EDGE) { canResize = true; resizeSide = 'ew'; resizeStart = e.clientX; resizeStartSize = r.width; }
            else if (side === 'right' && Math.abs(e.clientX - r.left) < EDGE) { canResize = true; resizeSide = 'ew'; resizeStart = e.clientX; resizeStartSize = r.width; }
            else if (side === 'bottom' && Math.abs(e.clientY - r.top) < EDGE) { canResize = true; resizeSide = 'ns'; resizeStart = e.clientY; resizeStartSize = r.height; }

            if (e.target.closest('button')) return;       // 点按钮（如"-"）不撕

            const t = e.touches[0];
            if (e.target.closest('button')) return;
            if (startTear(t.clientX, t.clientY)) { e.stopPropagation(); }

            if (!dockTearing) return;
            const t = e.touches[0]; moveTear(t.clientX, t.clientY);
            e.preventDefault();

        if (dockSwitchBtn) {
            dockSwitchBtn.addEventListener('click', e => {
                e.stopPropagation();
                if (dockSideMenu.style.display === 'none') showDockMenu(dockSwitchBtn);
                else hideDockMenu();
            });
        }

        // 单击标题栏仍走 makeDraggable 的拖拽逻辑（不冲突：dblclick 是独立事件）。
        let lastTitleClick = 0;
        titlebar.addEventListener('click', e => {
            if (e.target.closest('button')) return; // 点按钮不算
            const now = Date.now();
            if (now - lastTitleClick < 350) {
                // 双击
                e.preventDefault();
                e.stopPropagation();
                lastTitleClick = 0;
                if (win.classList.contains('docked')) undock();
                else dockTo('left');
            } else {
                lastTitleClick = now;
            }
        });

        // minimize 按钮：单击缩小（浮窗态）/ 退出停靠（停靠态）
        minimize.addEventListener('click', e => {
            e.stopPropagation();
            hideDockMenu();
            if (win.classList.contains('docked')) {
                undock();
            } else {
                toMiniIsland();
            }
        });

        // 双击文件项：自动 dock 文件树让出内容区。
        // 竖屏（高度 > 宽度，如手机）默认 dock 到底部；横屏默认 dock 到左侧。
        // 已 docked 时双击改为 undock（与标题栏双击行为一致）。
        // 用事件委托：文件树内容会随刷新重渲染，委托到容器避免每次 rebind。
        const treeContent = document.querySelector('.floating-tree-content');
        // 检测瘦长屏幕（手机竖屏）：高度 > 宽度。

        // 但宽高关系对方向判断是准的，最简单可靠。
        function isPortrait() {
            return window.innerHeight > window.innerWidth;
        }
        function handleFileDblDock() {
            if (win.classList.contains('docked')) {
                undock();
                return;
            }
            dockTo(isPortrait() ? 'bottom' : 'left');
        }

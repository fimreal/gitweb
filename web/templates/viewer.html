<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .RepoName }} - gitweb</title>
    <link rel="stylesheet" href="/static/css/viewer.css">
</head>
<body>
    <!-- 浮动气泡按钮：打开文件树窗口 -->
    <button class="floating-bubble" id="floating-bubble" title="打开文件目录">📁</button>

    <!-- 浮动文件树窗口 -->
    <div class="floating-tree-window" id="floating-tree-window">
        <div class="floating-tree-titlebar" id="floating-tree-titlebar">
            <h3>📁 文件目录</h3>
            <div class="floating-tree-controls">
                <button class="floating-tree-btn" id="minimize-btn" title="缩小为气泡">−</button>
                <button class="floating-tree-btn" id="close-btn" title="关闭">×</button>
            </div>
        </div>
        <div class="floating-tree-content" id="floating-tree-content">
            <div class="tree-loading">加载中...</div>
        </div>
    </div>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="viewer-header">
            <div class="repo-info">
                <h1 id="repo-title">{{ .RepoName }}</h1>
                <span class="repo-ref" id="repo-ref">{{ .Ref }}</span>
            </div>
            <div class="content-header-actions">
                <a href="/" class="home-link">← 首页</a>
            </div>
        </div>
        <div class="content-area" id="content-area">
            <div class="welcome">选择右侧文件目录中的文件查看内容</div>
        </div>
    </main>

    <!-- 凭据输入弹窗（私有仓库运行时鉴权） -->
    <div class="auth-modal" id="auth-modal" style="display:none;">
        <div class="auth-modal-card">
            <h2>该仓库需要鉴权</h2>
            <p>此 Git 仓库无公开访问权限，请输入凭据。凭据仅保存在当前浏览器标签页（sessionStorage），关闭即清除，不会上传服务器存储。</p>
            <div class="auth-form">
                <select id="auth-type">
                    <option value="token">Token</option>
                    <option value="basic">账号密码</option>
                </select>
                <input type="password" id="auth-token" placeholder="Token" autocomplete="off">
                <input type="text" id="auth-username" placeholder="用户名" autocomplete="off" style="display:none;">
                <input type="password" id="auth-password" placeholder="密码" autocomplete="off" style="display:none;">
                <div class="auth-actions">
                    <button id="auth-cancel">取消</button>
                    <button id="auth-submit" class="primary">确认</button>
                </div>
            </div>
        </div>
    </div>

<script>
(function () {
    const pathID = '{{ .PathID }}';
    const repoName = '{{ .RepoName }}';
    const STORAGE_KEY = 'gitweb_auth_' + pathID;
    let allFiles = [];
    let currentPath = '';
    let authResolve = null; // 凭据弹窗的 resolve

    // ---------- 凭据（sessionStorage，仅当前标签页） ----------
    function getStoredAuth() {
        try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY)); } catch (e) { return null; }
    }
    function storeAuth(auth) { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(auth)); }
    function authHeader() {
        const a = getStoredAuth();
        if (!a) return {};
        if (a.type === 'token') return { 'Authorization': 'Bearer ' + a.token };
        if (a.type === 'basic') return { 'Authorization': 'Basic ' + btoa(a.username + ':' + a.password) };
        return {};
    }

    // 带鉴权的 fetch：401 时弹窗要凭据，输入后重试一次。
    async function authFetch(url, opts) {
        opts = opts || {};
        opts.headers = Object.assign({}, opts.headers || {}, authHeader());
        let resp = await fetch(url, opts);
        if (resp.status === 401) {
            await promptAuth();
            opts.headers = Object.assign({}, opts.headers || {}, authHeader());
            resp = await fetch(url, opts);
        }
        return resp;
    }

    // 弹出凭据输入框，返回 Promise（用户确认后 resolve）
    function promptAuth() {
        if (authResolve) return authResolve; // 已有弹窗
        const modal = document.getElementById('auth-modal');
        modal.style.display = 'flex';
        return new Promise(resolve => {
            authResolve = resolve;
        });
    }
    function closeAuth(auth) {
        document.getElementById('auth-modal').style.display = 'none';
        const resolve = authResolve;
        authResolve = null;
        if (resolve) resolve(auth);
    }

    document.getElementById('auth-type').addEventListener('change', e => {
        const t = e.target.value;
        document.getElementById('auth-token').style.display = t === 'token' ? 'block' : 'none';
        document.getElementById('auth-username').style.display = t === 'basic' ? 'block' : 'none';
        document.getElementById('auth-password').style.display = t === 'basic' ? 'block' : 'none';
    });
    document.getElementById('auth-cancel').addEventListener('click', () => closeAuth(null));
    document.getElementById('auth-submit').addEventListener('click', () => {
        const type = document.getElementById('auth-type').value;
        const auth = { type };
        if (type === 'token') auth.token = document.getElementById('auth-token').value;
        else { auth.username = document.getElementById('auth-username').value; auth.password = document.getElementById('auth-password').value; }
        storeAuth(auth);
        closeAuth(auth);
    });

    // ---------- 文件树 ----------
    async function loadFileTree() {
        try {
            const resp = await authFetch('/api/sites/' + pathID + '/tree');
            if (!resp.ok) {
                document.getElementById('floating-tree-content').innerHTML =
                    '<div class="tree-error">加载文件树失败（' + resp.status + '）</div>';
                return;
            }
            const data = await resp.json();
            allFiles = data.files || [];
            renderTree(allFiles);
        } catch (err) {
            document.getElementById('floating-tree-content').innerHTML =
                '<div class="tree-error">加载文件树失败: ' + err.message + '</div>';
        }
    }

    function buildTree(files) {
        const root = { _files: [], _dirs: {} };
        files.forEach(file => {
            const parts = file.path.split('/');
            let cur = root;
            for (let i = 0; i < parts.length - 1; i++) {
                if (!cur._dirs[parts[i]]) cur._dirs[parts[i]] = { _files: [], _dirs: {} };
                cur = cur._dirs[parts[i]];
            }
            cur._files.push({ name: parts[parts.length - 1], path: file.path, size: file.size });
        });
        return root;
    }

    function renderTree(files) {
        const container = document.getElementById('floating-tree-content');
        if (!files.length) { container.innerHTML = '<div class="tree-empty">空仓库</div>'; return; }
        container.innerHTML = renderNode(buildTree(files), 0);
        attachTreeEvents();
    }

    function renderNode(node, level) {
        let html = '';
        Object.keys(node._dirs).sort().forEach(dir => {
            html += '<div class="folder-item" data-level="' + level + '" style="padding-left:' + (level * 16) + 'px">'
                + '<span class="folder-icon">📁</span><span class="folder-name">' + escapeHtml(dir) + '</span></div>'
                + '<div class="folder-children" style="display:none">' + renderNode(node._dirs[dir], level + 1) + '</div>';
        });
        node._files.sort((a, b) => a.name.localeCompare(b.name));
        node._files.forEach(file => {
            html += '<div class="file-item" data-path="' + escapeHtml(file.path) + '" data-level="' + level + '" style="padding-left:' + (level * 16 + 16) + 'px">'
                + '<span class="file-icon">📄</span><span class="file-name">' + escapeHtml(file.name) + '</span>'
                + '<span class="file-size">' + (file.size > 0 ? ' ' + formatSize(file.size) : '') + '</span></div>';
        });
        return html;
    }

    function attachTreeEvents() {
        document.querySelectorAll('.file-item').forEach(item => {
            item.addEventListener('click', () => {
                const path = item.dataset.path;
                loadFile(path);
                document.querySelectorAll('.file-item').forEach(f => f.classList.remove('active'));
                item.classList.add('active');
            });
        });
        document.querySelectorAll('.folder-item').forEach(item => {
            item.addEventListener('click', () => {
                const next = item.nextElementSibling;
                if (next && next.classList.contains('folder-children')) {
                    const open = next.style.display !== 'none';
                    next.style.display = open ? 'none' : 'block';
                    item.querySelector('.folder-icon').textContent = open ? '📁' : '📂';
                }
            });
        });
    }

    // ---------- 文件加载 ----------
    async function loadFile(path) {
        currentPath = path;
        const area = document.getElementById('content-area');
        area.innerHTML = '<div class="welcome">加载中...</div>';

        const lower = path.toLowerCase();
        try {
            // HTML：iframe sandbox 承载（不加 allow-scripts，防恶意脚本逃逸）
            if (lower.endsWith('.html') || lower.endsWith('.htm')) {
                renderHTMLInIframe(path);
                return;
            }
            // 图片：直接 <img>
            if (/\.(png|jpe?g|gif|bmp|webp|svg|ico)$/i.test(path)) {
                area.innerHTML = '<div class="image-container"><img src="/' + pathID + '/' + encodeURI(path) + '" alt="' + escapeHtml(path) + '"></div>';
                return;
            }
            // md/txt/代码：后端返回 HTML 片段，前端注入。长内容前端分页。
            const resp = await authFetch('/' + pathID + '/' + encodeURI(path));
            if (!resp.ok) { area.innerHTML = '<div class="error">加载失败（' + resp.status + '）</div>'; return; }
            const html = await resp.text();
            renderTextWithPagination(area, path, html);
        } catch (err) {
            area.innerHTML = '<div class="error">加载失败: ' + err.message + '</div>';
        }
    }

    function renderHTMLInIframe(path) {
        const area = document.getElementById('content-area');
        const notice = document.createElement('div');
        notice.className = 'html-notice';
        notice.innerHTML = '⚠️ HTML 在隔离的沙箱中显示（禁用脚本）。'
            + '<a href="/' + pathID + '/' + encodeURI(path) + '" target="_blank">在新标签页打开</a>';
        const iframe = document.createElement('iframe');
        iframe.className = 'html-frame';
        iframe.src = '/' + pathID + '/' + encodeURI(path);
        // sandbox 不加 allow-scripts：防不可信仓库的恶意脚本执行
        iframe.setAttribute('sandbox', 'allow-same-origin');
        area.innerHTML = '';
        area.appendChild(notice);
        area.appendChild(iframe);
    }

    // 前端分页：按渲染片段的行数切，每页 maxLines 行。
    function renderTextWithPagination(area, path, html) {
        // html 是后端渲染的片段（<pre><code>... 或 markdown 的 HTML）
        // 检测是否为 <pre><code>（纯文本），按行切；markdown 内容不分页（避免截断标签）
        if (html.startsWith('<pre><code>')) {
            const raw = html.slice('<pre><code>'.length, html.length - '</code></pre>'.length);
            const lines = raw.split('\n');
            const maxLines = 1000;
            if (lines.length <= maxLines) {
                area.innerHTML = '<div class="code-container"><div class="code-content"><pre><code>' + raw + '</code></pre></div></div>';
                return;
            }
            let page = 0;
            const totalPages = Math.ceil(lines.length / maxLines);
            function renderPage(p) {
                const start = p * maxLines, end = Math.min(start + maxLines, lines.length);
                const pageContent = lines.slice(start, end).join('\n');
                const container = document.createElement('div');
                container.className = 'code-container';
                container.innerHTML = '<div class="code-header"><span class="code-filename">' + escapeHtml(path)
                    + ' (行 ' + (start + 1) + '-' + end + ' / ' + lines.length + ')</span></div>'
                    + '<div class="code-content"><pre><code>' + pageContent + '</code></pre></div>';
                const pager = document.createElement('div');
                pager.className = 'pagination';
                pager.innerHTML = '<button ' + (p === 0 ? 'disabled' : '') + ' data-p="' + (p - 1) + '">上一页</button>'
                    + '<span>第 ' + (p + 1) + ' / ' + totalPages + ' 页</span>'
                    + '<button ' + (p === totalPages - 1 ? 'disabled' : '') + ' data-p="' + (p + 1) + '">下一页</button>';
                pager.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
                    const np = parseInt(b.dataset.p, 10);
                    if (!isNaN(np)) renderPage(np);
                }));
                container.appendChild(pager);
                area.innerHTML = '';
                area.appendChild(container);
                area.scrollTop = 0;
            }
            renderPage(page);
        } else {
            // markdown 渲染结果：直接注入（不分页，goldmark 已是结构化 HTML）
            area.innerHTML = '<div class="markdown-body">' + html + '</div>';
        }
    }

    // ---------- 首屏：自动加载 README ----------
    function autoOpenDefault() {
        const candidates = ['README.md', 'readme.md', 'README.MD', 'index.html', 'README.txt', 'README'];
        for (const c of candidates) {
            if (allFiles.some(f => f.path === c || f.path.endsWith('/' + c))) {
                loadFile(c);
                // 高亮文件树
                const target = document.querySelector('.file-item[data-path="' + c + '"]');
                if (target) target.classList.add('active');
                return;
            }
        }
    }

    // ---------- 浮窗交互 ----------
    function initFloatingTree() {
        const win = document.getElementById('floating-tree-window');
        const titlebar = document.getElementById('floating-tree-titlebar');
        const bubble = document.getElementById('floating-bubble');
        const minimize = document.getElementById('minimize-btn');
        const closeBtn = document.getElementById('close-btn');
        if (!win || !bubble) return;

        bubble.addEventListener('click', () => { win.classList.add('show'); bubble.classList.add('hidden'); });
        minimize.addEventListener('click', () => { win.classList.remove('show'); bubble.classList.remove('hidden'); });
        closeBtn.addEventListener('click', () => { win.classList.remove('show'); bubble.classList.remove('hidden'); });

        let dragging = false, ox = 0, oy = 0;
        titlebar.addEventListener('mousedown', e => {
            if (e.target.tagName === 'BUTTON') return;
            dragging = true;
            ox = e.clientX - win.offsetLeft;
            oy = e.clientY - win.offsetTop;
            titlebar.style.cursor = 'grabbing';
        });
        document.addEventListener('mousemove', e => {
            if (!dragging) return;
            e.preventDefault();
            const x = Math.max(0, Math.min(e.clientX - ox, window.innerWidth - win.offsetWidth));
            const y = Math.max(0, Math.min(e.clientY - oy, window.innerHeight - win.offsetHeight));
            win.style.left = x + 'px'; win.style.top = y + 'px'; win.style.right = 'auto';
        });
        document.addEventListener('mouseup', () => { if (dragging) { dragging = false; titlebar.style.cursor = 'move'; } });

        // 默认展开浮窗
        win.classList.add('show');
        bubble.classList.add('hidden');
    }

    // ---------- 工具 ----------
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function formatSize(b) {
        if (b < 1024) return b + ' B';
        if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
        return (b / 1048576).toFixed(1) + ' MB';
    }

    // ---------- 启动 ----------
    document.addEventListener('DOMContentLoaded', () => {
        initFloatingTree();
        loadFileTree().then(autoOpenDefault);
    });
})();
</script>
</body>
</html>

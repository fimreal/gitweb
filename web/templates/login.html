<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gitweb · Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: auto;
            padding: 24px;
        }
        .login-wrap {
            width: 100%;
            max-width: 380px;
            position: relative;
        }
        .login-card {
            background: var(--glass-bg);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(160%);
            backdrop-filter: blur(var(--glass-blur)) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-xl);
            box-shadow: var(--shadow-xl);
            padding: 36px 32px;
        }
        .login-card h1 {
            margin: 0 0 6px;
            font-size: 24px;
            font-weight: 700;
            color: var(--fg);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-card h1 svg {
            width: 26px;
            height: 26px;
            color: var(--accent);
            -webkit-text-fill-color: var(--accent);
        }
        .login-card .sub {
            margin: 0 0 24px;
            color: var(--secondary);
            font-size: 14px;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .login-form input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            background: var(--panel-bg);
            color: var(--fg);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        .login-form input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .login-form button[type="submit"] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--r-sm);
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform .15s, box-shadow .15s;
            font-family: inherit;
        }
        .login-form button[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .login-form button[type="submit"]:active {
            transform: translateY(0);
        }
        .err {
            color: var(--error);
            font-size: 13px;
            margin: -4px 0 4px;
            min-height: 18px;
        }
        :root {
            --error: #dc2626;
        }
        [data-theme="dark"] {
            --error: #f87171;
        }
    </style>
</head>
<body>
    <div class="controls">
        <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </button>
        <button id="lang-toggle" class="icon-btn" title="Switch language" aria-label="Switch language">EN</button>
    </div>

    <div class="login-wrap">
        <div class="login-card">
            <h1>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="6" r="2.5"/><path d="M6 8.5v7"/><path d="M6 12h6a3 3 0 0 0 3-3V8.5"/></svg>
                gitweb
            </h1>
            <p class="sub" data-en="Enter password to continue" data-zh="输入密码以继续">Enter password to continue</p>
            <form class="login-form" method="POST" action="/login" autocomplete="off">
                <input type="hidden" name="redirect" value="{{ .Redirect }}">
                <input type="password" name="password" id="password"
                       placeholder="Password"
                       data-en-placeholder="Password"
                       data-zh-placeholder="密码"
                       autocomplete="current-password"
                       autofocus required>
                <p class="err">
                    {{ if .Error }}<span data-en="Wrong password" data-zh="密码错误">Wrong password</span>{{ end }}
                    {{ if .Locked }}<span data-en="Too many attempts. Try again in {{ .LockSec }}s." data-zh="尝试次数过多，请 {{ .LockSec }} 秒后重试。">Too many attempts. Try again in {{ .LockSec }}s.</span>{{ end }}
                </p>
                <button type="submit" data-en="Login" data-zh="登录">Login</button>
            </form>
        </div>
    </div>

    <script>
    (function () {
        var currentLang = localStorage.getItem('lang') || (navigator.language.startsWith('zh') ? 'zh' : 'en');

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
        }

        function initTheme() {
            var saved = localStorage.getItem('theme');
            var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(saved || (systemDark ? 'dark' : 'light'));

            var toggle = document.getElementById('theme-toggle');
            if (toggle) {
                toggle.addEventListener('click', function () {
                    var cur = document.documentElement.getAttribute('data-theme') || 'light';
                    var next = cur === 'dark' ? 'light' : 'dark';
                    applyTheme(next);
                    localStorage.setItem('theme', next);
                });
            }

            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
                if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
            });
        }

        function applyLang(lang) {
            document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en');
            document.querySelectorAll('[data-en][data-zh]').forEach(function (el) {
                var text = lang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
                if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = text;
                else el.textContent = text;
            });
            document.querySelectorAll('[data-en-placeholder][data-zh-placeholder]').forEach(function (el) {
                el.placeholder = lang === 'zh' ? el.getAttribute('data-zh-placeholder') : el.getAttribute('data-en-placeholder');
            });
        }

        function initLang() {
            applyLang(currentLang);
            var btn = document.getElementById('lang-toggle');
            if (btn) {
                btn.textContent = currentLang === 'en' ? '中' : 'EN';
                btn.title = currentLang === 'en' ? 'Switch language' : '切换语言';
                btn.addEventListener('click', function () {
                    currentLang = currentLang === 'en' ? 'zh' : 'en';
                    localStorage.setItem('lang', currentLang);
                    applyLang(currentLang);
                    btn.textContent = currentLang === 'en' ? '中' : 'EN';
                    btn.title = currentLang === 'en' ? 'Switch language' : '切换语言';
                });
            }
        }

        initTheme();
        initLang();
    })();
    </script>
</body>
</html>

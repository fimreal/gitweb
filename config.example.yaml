base_url: http://localhost:8080
listen: ":8080"
# 可选访问密码（密钥）：设置后所有页面均需登录才能访问。
# 可在启动参数 -password 覆盖；留空或不设置 = 公开访问（默认行为）。
# password: "your-secret-password"

# No admin_token: this is a public service. Registration is open.
# Abuse is bounded by SSRF protection, file-size limits, and cache/timeout caps.

cache:
  ttl: 60s
  max_entries: 2048
  max_file_size: 5242880  # 5MB in bytes

fetch:
  timeout: 10s
  http_proxy: ""   # e.g., http://10.0.0.1:7890
  https_proxy: ""  # e.g., http://10.0.0.1:7890
  # SSRF: allow/deny wildcards (*.gitea.*). Private/loopback/link-local IPs
  # are blocked by default regardless of these lists.
  # 放行可信的自托管内网实例（其域名解析到私网 IP 时必须显式 allow）：
  allow_hosts:
    - git.example.com   # 换成你自己的自托管实例域名
  deny_hosts: []
  # Rate limit: requests per minute per host. Default 100 (≈6000 req/hour).
  # Limits external Git API calls (GitHub/GitLab/Gitea) to avoid abuse.
  # 限流：每分钟对每个 Git 平台（host）的请求上限，默认 100。
  rate_limit: 100

sites:
  - git_url: https://github.com/fimreal/gitweb.git
    pathid: gitweb
    ref: main
    # hidden: true   # 不进公开 /api/sites 列表；直链 /{pathid}/ 仍可访问。默认 false。
    # auth is only for preloaded private repos. For repos registered at runtime,
    # enter credentials in the browser when the repo is opened.
    # auth:
    #   type: token
    #   token: ${GITHUB_TOKEN}
